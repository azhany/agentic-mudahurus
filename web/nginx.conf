server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA history-mode fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API + storefront + invoice to the Go service.
    location ~ ^/(auth|me|products|categories|orders|pending_orders|customers|coupons|dashboard|store|invoice|assistant|operator|files|payments)(/|$) {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
