server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API namespace -> Go service (keeps the /api prefix).
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Everything else is the SPA (history-mode fallback) — so /store/:username,
    # /invoice/:id, /admin/*, /login render the Vue pages.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
