# MUDAHURUS 2.0 — local dev stack (MH-002).
# `docker compose up` brings up Postgres, MinIO, Qdrant, the Go API, the RAG
# FastAPI, and the Vue SPA with seed config. See ../.env.example for variables.
name: mudahurus

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mudahurus
      POSTGRES_PASSWORD: mudahurus
      POSTGRES_DB: mudahurus
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mudahurus"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: ["qdrantdata:/qdrant/storage"]

  api:
    build: ../api
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      APP_ENV: development
      API_HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://mudahurus:mudahurus@postgres:5432/mudahurus?sslmode=disable
      JWT_ACCESS_SECRET: dev-access-secret-change-me
      JWT_REFRESH_SECRET: dev-refresh-secret-change-me
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: mudahurus
      RAG_BASE_URL: http://rag:8000
      EVENTS_SINK: http
      AIRFLOW_TRIGGER_URL: http://rag:8000/ingest
    ports: ["8080:8080"]

  rag:
    build:
      context: ../rag
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      RAG_HTTP_ADDR: 0.0.0.0:8000
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: mudahurus
      RAG_DATABASE_URL: postgresql://mudahurus:mudahurus@postgres:5432/mudahurus
      LLM_PROVIDER: echo
    ports: ["8000:8000"]

  # Opt-in one-shot seeder: `docker compose run --rm seed`
  seed:
    build: ../api
    profiles: ["tools"]
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      DATABASE_URL: postgres://mudahurus:mudahurus@postgres:5432/mudahurus?sslmode=disable
    entrypoint: ["/app/seed"]

  web:
    build: ../web
    depends_on: [api]
    ports: ["5173:80"]

  prometheus:
    image: prom/prometheus:latest
    volumes: ["./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"]
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports: ["3000:3000"]
    depends_on: [prometheus]

volumes:
  pgdata:
  miniodata:
  qdrantdata:
